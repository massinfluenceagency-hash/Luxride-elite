<?xml version="1.0" encoding="UTF-8"?>
<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A765;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8952A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="72" height="72" rx="13" fill="url(#bgGrad)"/>

  <!-- Gold border -->
  <rect x="3" y="3"
        width="66" height="66"
        rx="11"
        fill="none" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Car silhouette icon -->
  <g transform="translate(7, 20)">
    <!-- Car body -->
    <rect x="2" y="12"
          width="36" height="14"
          rx="2" fill="url(#goldGrad)"/>
    <!-- Car roof -->
    <path d="M8 12
             L12 4
             L28 4
             L32 12 Z"
          fill="url(#goldGrad)"/>
    <!-- Wheels -->
    <circle cx="10" cy="27"
            r="4" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="1"/>
    <circle cx="30" cy="27"
            r="4" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="1"/>
  </g>

  <!-- LR text -->
  <text x="36" y="66"
        font-family="Georgia, serif" font-size="6"
        font-weight="700" fill="url(#goldGrad)"
        text-anchor="middle" letter-spacing="1">LUXRIDE</text>
</svg>