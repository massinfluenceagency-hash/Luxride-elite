<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A765;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8952A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="23" fill="url(#bgGrad)"/>

  <!-- Gold border -->
  <rect x="5" y="5"
        width="118" height="118"
        rx="19"
        fill="none" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- Car silhouette icon -->
  <g transform="translate(13, 36)">
    <!-- Car body -->
    <rect x="4" y="21"
          width="63" height="25"
          rx="4" fill="url(#goldGrad)"/>
    <!-- Car roof -->
    <path d="M14 21
             L21 7
             L49 7
             L56 21 Z"
          fill="url(#goldGrad)"/>
    <!-- Wheels -->
    <circle cx="18" cy="48"
            r="7" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="2"/>
    <circle cx="53" cy="48"
            r="7" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="2"/>
  </g>

  <!-- LR text -->
  <text x="64" y="118"
        font-family="Georgia, serif" font-size="12"
        font-weight="700" fill="url(#goldGrad)"
        text-anchor="middle" letter-spacing="3">LUXRIDE</text>
</svg>