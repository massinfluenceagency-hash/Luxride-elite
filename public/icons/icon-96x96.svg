<?xml version="1.0" encoding="UTF-8"?>
<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A765;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8952A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="96" height="96" rx="17" fill="url(#bgGrad)"/>

  <!-- Gold border -->
  <rect x="4" y="4"
        width="88" height="88"
        rx="14"
        fill="none" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Car silhouette icon -->
  <g transform="translate(10, 27)">
    <!-- Car body -->
    <rect x="3" y="16"
          width="48" height="19"
          rx="3" fill="url(#goldGrad)"/>
    <!-- Car roof -->
    <path d="M11 16
             L16 5
             L37 5
             L42 16 Z"
          fill="url(#goldGrad)"/>
    <!-- Wheels -->
    <circle cx="13" cy="36"
            r="5" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="2"/>
    <circle cx="40" cy="36"
            r="5" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="2"/>
  </g>

  <!-- LR text -->
  <text x="48" y="88"
        font-family="Georgia, serif" font-size="9"
        font-weight="700" fill="url(#goldGrad)"
        text-anchor="middle" letter-spacing="2">LUXRIDE</text>
</svg>