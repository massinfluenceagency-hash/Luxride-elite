<?xml version="1.0" encoding="UTF-8"?>
<svg width="152" height="152" viewBox="0 0 152 152" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A765;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8952A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="152" height="152" rx="27" fill="url(#bgGrad)"/>

  <!-- Gold border -->
  <rect x="6" y="6"
        width="140" height="140"
        rx="23"
        fill="none" stroke="url(#goldGrad)" stroke-width="4"/>

  <!-- Car silhouette icon -->
  <g transform="translate(15, 43)">
    <!-- Car body -->
    <rect x="4" y="25"
          width="76" height="29"
          rx="5" fill="url(#goldGrad)"/>
    <!-- Car roof -->
    <path d="M17 25
             L25 8
             L59 8
             L67 25 Z"
          fill="url(#goldGrad)"/>
    <!-- Wheels -->
    <circle cx="21" cy="57"
            r="8" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="3"/>
    <circle cx="63" cy="57"
            r="8" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="3"/>
  </g>

  <!-- LR text -->
  <text x="76" y="140"
        font-family="Georgia, serif" font-size="14"
        font-weight="700" fill="url(#goldGrad)"
        text-anchor="middle" letter-spacing="3">LUXRIDE</text>
</svg>