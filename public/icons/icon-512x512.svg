<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A765;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8952A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="92" fill="url(#bgGrad)"/>

  <!-- Gold border -->
  <rect x="20" y="20"
        width="471" height="471"
        rx="77"
        fill="none" stroke="url(#goldGrad)" stroke-width="13"/>

  <!-- Car silhouette icon -->
  <g transform="translate(51, 143)">
    <!-- Car body -->
    <rect x="14" y="85"
          width="254" height="99"
          rx="17" fill="url(#goldGrad)"/>
    <!-- Car roof -->
    <path d="M56 85
             L85 28
             L197 28
             L226 85 Z"
          fill="url(#goldGrad)"/>
    <!-- Wheels -->
    <circle cx="71" cy="192"
            r="28" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="8"/>
    <circle cx="212" cy="192"
            r="28" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="8"/>
  </g>

  <!-- LR text -->
  <text x="256" y="471"
        font-family="Georgia, serif" font-size="46"
        font-weight="700" fill="url(#goldGrad)"
        text-anchor="middle" letter-spacing="10">LUXRIDE</text>
</svg>