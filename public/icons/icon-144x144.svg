<?xml version="1.0" encoding="UTF-8"?>
<svg width="144" height="144" viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A765;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8952A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="144" height="144" rx="26" fill="url(#bgGrad)"/>

  <!-- Gold border -->
  <rect x="6" y="6"
        width="132" height="132"
        rx="22"
        fill="none" stroke="url(#goldGrad)" stroke-width="4"/>

  <!-- Car silhouette icon -->
  <g transform="translate(14, 40)">
    <!-- Car body -->
    <rect x="4" y="24"
          width="71" height="28"
          rx="5" fill="url(#goldGrad)"/>
    <!-- Car roof -->
    <path d="M16 24
             L24 8
             L55 8
             L63 24 Z"
          fill="url(#goldGrad)"/>
    <!-- Wheels -->
    <circle cx="20" cy="54"
            r="8" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="2"/>
    <circle cx="59" cy="54"
            r="8" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="2"/>
  </g>

  <!-- LR text -->
  <text x="72" y="132"
        font-family="Georgia, serif" font-size="13"
        font-weight="700" fill="url(#goldGrad)"
        text-anchor="middle" letter-spacing="3">LUXRIDE</text>
</svg>