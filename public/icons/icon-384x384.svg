<?xml version="1.0" encoding="UTF-8"?>
<svg width="384" height="384" viewBox="0 0 384 384" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A765;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8952A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="384" height="384" rx="69" fill="url(#bgGrad)"/>

  <!-- Gold border -->
  <rect x="15" y="15"
        width="353" height="353"
        rx="58"
        fill="none" stroke="url(#goldGrad)" stroke-width="10"/>

  <!-- Car silhouette icon -->
  <g transform="translate(38, 108)">
    <!-- Car body -->
    <rect x="11" y="63"
          width="190" height="74"
          rx="13" fill="url(#goldGrad)"/>
    <!-- Car roof -->
    <path d="M42 63
             L63 21
             L148 21
             L169 63 Z"
          fill="url(#goldGrad)"/>
    <!-- Wheels -->
    <circle cx="53" cy="143"
            r="21" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="6"/>
    <circle cx="158" cy="143"
            r="21" fill="#0A0A0A" stroke="url(#goldGrad)"
            stroke-width="6"/>
  </g>

  <!-- LR text -->
  <text x="192" y="353"
        font-family="Georgia, serif" font-size="35"
        font-weight="700" fill="url(#goldGrad)"
        text-anchor="middle" letter-spacing="8">LUXRIDE</text>
</svg>